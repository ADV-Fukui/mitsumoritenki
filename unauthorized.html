<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アクセスできません</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
      background: #f0efe8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
    }
    .box {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 12px;
      padding: 40px 48px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
    p { font-size: 13px; color: #666; line-height: 1.7; margin-bottom: 24px; }
    a {
      display: inline-block;
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      color: #1a1a1a;
      text-decoration: none;
    }
    a:hover { background: #f5f5f0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔒</div>
    <h1>アクセスできません</h1>
    <p>このアプリは社内アカウント専用です。<br>別のアカウントでお試しの場合は、<br>社内アカウントでログインしてください。</p>
    <a href="/.auth/logout?post_logout_redirect_uri=/.auth/login/aad">別のアカウントでログイン</a>
  </div>
</body>
</html>
